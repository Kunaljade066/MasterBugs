# ============================================================
# BugPulse Cloudflare Worker — wrangler.toml
# ============================================================

name = "bugpulse-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# ── KV Namespaces (optional: caching / config / flags) ───────
[[kv_namespaces]]
binding = "HWT_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxx"         
preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── D1 Database (MAIN STORAGE) ───────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "bugpulse-db"
database_id = "5dcb154d-6c6d-461d-852c-700d7e5ce9ac"

# ── Cron Triggers ────────────────────────────────────────────
[triggers]
crons = [
  "0 * * * *",
  "30 * * * *"
]

# ── Environment Variables ────────────────────────────────────
[vars]
APP_URL = "https://hitwicket-bugpulse.vercel.app"
TIMEZONE = "Asia/Kolkata"
